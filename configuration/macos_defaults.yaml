# macOS preferences applied via the defaults command.
#
# This file is organized into two buckets:
# - stable_*: commonly used defaults keys that are generally backed by long-lived macOS preferences
# - community_*: tweaks commonly shared by the macOS community, but more likely to be undocumented,
#   version-sensitive, or implementation-detail driven

